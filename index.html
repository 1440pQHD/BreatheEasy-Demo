<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>BreatheEasy DEMO</title>
        <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <style>
            .demo-wrapper{display: flex; gap: 40px; justify-content: center; padding: 40px; }
            .control-panel {background: #112e81; padding: 25px; border-radius: 15px; color: white; width: 300px; height: fit-content;}
            .control-group {margin-bottom: 20px; }
            .control-group label {display: block; margin-bottom: 8px; font-weight: bold; }
            input[type=range] {width: 100%; cursor: pointer;} 
        </style>


    </head>
    <body>

        <div class="demo-wrapper">
            <aside class="control-panel">
                <h2>Demo controls</h2>

                <button id="theme-toggle">🌙 Toggle Dark mode </button>
                
                <div class="control-group">
                    <label>Temperature</label>
                    <input type="range" id="temp-slider" min="0" max="60" step="0.1" value="25">

                </div>
                <div class="control-group">
                    <label>Humidity</label>
                    <input type="range" id="hum-slider" min="0" max="100" step="1" value="50">

                </div>
                <div class="control-group">
                    <label>MQ-135 sensor</label>
                    <input type="range" id="mq-slider" min="0" max="2200" step="10" value="500">
                </div>
                <div class="control-group">
                    <label>Pressure</label>
                    <input type="range" id="press-slider" min="800" max="2500" step="1" value="1013">
                </div>
                <div class="control-group">
                    <label>Trigger Alarm</label>
                    <input type="checkbox" id="alarm-toggle">
                </div>

            </aside>

            <main class="container">
                <img class="logo" src="https://i.ibb.co/352FNBKK/image.png" alt="Logo">
                <h1>📈ESP32 Data Dashboard📉</h1>
                <div class="subtitle">Simulation Mode🖥️</div>
                
                <div class="status" id="status"> Service Nominal✅</div>

                <div class="card">
                    <div class="label">Temperature🌡️</div>
                    <div class="value" id="temperature">--</div>
                    <div class="progress-track"><div id="temp-progress" class="progress-fill"></div></div>
                </div>
                <div class="card">
                    <div class="label">Humidity💦</div>
                    <div class="value" id="humidity">--</div>
                    <div class="progress-track"><div id="hum-progress" class="progress-fill"></div></div>
                </div>
                <div class="card">
                    <div class="label">MQ-135 Hazardous gasses level💨</div>
                    <div class="progress-track"><div id="mq135-progress" class="progress-fill"></div></div>
                    <div class="value" id="mq135">--</div>
                </div>
                
                <div class="card">
                    <div class="label">Pressure💪</div>
                    <div class="value" id="pressure">-- hPa</div>
                    <div class="progress-track"><div id="press-progress" class="progress-fill"></div></div>
                </div>
                <div class="card">
                    <div class="label">Latest Event❗</div>
                    <div class="value" id="event">Simulation Active</div>                   
                </div>
                
            </main>
        </div>
        <script>
            let alarmPlaying = false;
            let audioContext = null;
            let alarmInterval = null;

            const tempSlider = document.getElementById('temp-slider');
            const humSlider = document.getElementById('hum-slider');
            const mqSlider = document.getElementById('mq-slider');
            const alarmToggle = document.getElementById('alarm-toggle');
            const pressSlider = document.getElementById('press-slider');
            const toggleBtn = document.getElementById('theme-toggle'); // FIX: Added the missing toggleBtn!

            const tempVal = document.getElementById('temperature');
            const humVal = document.getElementById('humidity');
            const mqVal = document.getElementById('mq135'); // FIX: Matched HTML ID
            const pressVal = document.getElementById('pressure');

            const tempBar = document.getElementById('temp-progress');
            const humBar = document.getElementById('hum-progress');
            const mqBar = document.getElementById('mq135-progress'); // FIX: Matched HTML ID
            const pressBar = document.getElementById('press-progress');
            const statusElem = document.getElementById('status');
            const eventElem = document.getElementById('event');

            // Dark Mode 
            toggleBtn.addEventListener('click', () => {
                let theme = document.documentElement.getAttribute('data-theme');
                let newTheme = (theme === 'light') ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');

            // Alarm Sound 
            function startAlarm(){
                if(alarmPlaying) return;
                alarmPlaying = true;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                alarmInterval = setInterval(() => {
                    let oscillator = audioContext.createOscillator();
                    let gainNode = audioContext.createGain();
                    oscillator.type = "square";
                    oscillator.frequency.value = 600;
                    gainNode.gain.value = 0.1;
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.start();
                    setTimeout(() => { oscillator.stop(); }, 200);
                }, 500);
            }

            function stopAlarm(){
                alarmPlaying = false;
                if(alarmInterval){
                    clearInterval(alarmInterval);
                    alarmInterval = null;
                }
                if(audioContext){
                    audioContext.close();
                    audioContext = null;
                }
            }

            // Main Dashboard Update 
            function updateDashboard() {
                const temp = parseFloat(tempSlider.value);
                const hum = parseInt(humSlider.value);
                const mq = parseInt(mqSlider.value);
                const press = parseInt(pressSlider.value);
                let isAlarmtriggered = alarmToggle.checked;
                
                // Temperature
                if (tempVal) tempVal.innerHTML = temp.toFixed(1) + " °C";
                if (tempBar) {
                    let tempPercent = (temp / 50.0) * 100;
                    if (tempPercent > 100) tempPercent = 100;
                    if (tempPercent < 0 ) tempPercent = 0;
                    tempBar.style.width = tempPercent + "%";

                    if (temp < 15) tempBar.style.backgroundColor = "#3b82f6";
                    else if (temp < 35) tempBar.style.backgroundColor = "#10b981";
                    else {
                        tempBar.style.backgroundColor = "#ef4444";
                        isAlarmtriggered = true;
                    } 
                }

                // Humidity
                if (humVal) humVal.innerHTML = hum + "%";
                if (humBar) {
                    let humPercent = hum;
                    humBar.style.width = humPercent + "%";

                    if (humPercent < 30) humBar.style.backgroundColor = "#f97316";
                    else if (humPercent < 70) humBar.style.backgroundColor = "#10b981";
                    else {
                        humBar.style.backgroundColor = "#3b82f6";
                        isAlarmtriggered = true;
                    }
                }

                // MQ-135 Air Quality
                if (mqVal) mqVal.innerHTML = "ADC: " + mq;
                if (mqBar) {
                    const MQ3_LIMIT = 2200;
                    let mqPercent = (mq / MQ3_LIMIT) * 100;
                    if (mqPercent > 100) mqPercent = 100;
                    mqBar.style.width = mqPercent + "%";

                    if (mqPercent < 50) mqBar.style.backgroundColor = "#10b981";
                    else if (mqPercent < 70) mqBar.style.backgroundColor = "#f59e0b";
                    else {
                        mqBar.style.backgroundColor = "#ef4444";
                        isAlarmtriggered = true;
                    }
                }

                // Pressure
                if (pressVal) pressVal.innerHTML = press + " hPa";
                if (pressBar) {
                    let pressPercent = ((press - 950) / 100) * 100;
                    pressBar.style.width = Math.max(0, Math.min(100, pressPercent)) + "%"; // FIX: Added the 0 for Math.max

                    if (press < 980) pressBar.style.backgroundColor = "#10b981";
                    else if (press <= 1022) pressBar.style.backgroundColor = "#f59e0b";
                    else {
                        pressBar.style.backgroundColor = "#ef4444"; // FIX: Changed 'press' to 'pressBar'
                        isAlarmtriggered = true;
                    }
                }
                // FIX: Removed the rogue closing bracket that was right here!

                // Global Alarm Logic
                if (isAlarmtriggered) {
                    if(statusElem) {
                        statusElem.innerHTML = "🚨 ALARM!!";
                        statusElem.style.background = "#ef4444";
                        statusElem.style.color = "#FFFFFF";
                    }
                    if (eventElem){
                        if (mq > 1870) {
                            eventElem.innerHTML = "Critical Air Quality threshold breached!";
                        } else {
                            eventElem.innerHTML = "Manual Alarm / System Check";
                        }
                    }
                    startAlarm();
                } else {
                    if (statusElem){
                        statusElem.innerHTML= "🟢 Service Nominal";
                        statusElem.style.background = "#10b981";
                        statusElem.style.color = "#FFFFFF";
                    }
                    if (eventElem){
                        eventElem.innerHTML = "Simulation running smoothly";
                    }
                    stopAlarm();
                }
            }

            // Event Listeners for Sliders
            tempSlider.addEventListener('input', updateDashboard);
            humSlider.addEventListener('input', updateDashboard);
            pressSlider.addEventListener('input', updateDashboard);
            mqSlider.addEventListener('input', updateDashboard);
            alarmToggle.addEventListener('change', updateDashboard);

            // Run once on load
            updateDashboard();

            </script>
    </body>
</html>
